name = "wc26-football-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = true

# Cron trigger. The 2026 World Cup is over and the data is frozen, so the cron
# is DISABLED (empty array) — no more scheduled ESPN fetches / KV writes.
# Deploying with `crons = []` reliably removes the schedules (the experimental
# `wrangler triggers deploy` can fail on the schedules API). To reopen a live
# edition, restore:  crons = ["*/3 * * * *"]
[triggers]
crons = []

# KV store that holds the shared snapshot + accumulated dataset.
# Create it once and paste the returned id below:
#   npx wrangler kv namespace create WC26
[[kv_namespaces]]
binding = "WC26"
id = "8fb63d9aa3634b199b3d5f5872997fe3"

[vars]
MAX_DAILY = "2000"   # safety cap on ESPN fetches per day (ESPN is free/key-less)
ENRICH_LIMIT = "12"  # enrich up to 12 live matches with goals/fouls/shots per run
                     # (covers every simultaneous game so live goals are captured)
# ALLOW_ORIGIN = "https://oscarzu.github.io"   # optional: lock CORS to your site

# Source: ESPN's free public API (https://site.api.espn.com/.../soccer/fifa.world).
# No API key required — you can remove the old API_FOOTBALL_KEY secret if you like:
#   npx wrangler secret delete API_FOOTBALL_KEY
