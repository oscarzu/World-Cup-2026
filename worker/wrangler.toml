name = "wc26-football-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = true

# Cron: collect from API-Football every 5 minutes (the ONLY API consumer).
# A daily budget counter in the Worker caps usage so you never exceed 100/day.
[triggers]
crons = ["*/5 * * * *"]

# KV store that holds the shared snapshot + accumulated dataset.
# Create it once and paste the returned id below:
#   npx wrangler kv namespace create WC26
[[kv_namespaces]]
binding = "WC26"
id = "8fb63d9aa3634b199b3d5f5872997fe3"

[vars]
MAX_DAILY = "2000"   # safety cap on ESPN fetches per day (ESPN is free/key-less)
ENRICH_LIMIT = "6"   # how many live matches to enrich with fouls/shots/cards per run
# ALLOW_ORIGIN = "https://oscarzu.github.io"   # optional: lock CORS to your site

# Source: ESPN's free public API (https://site.api.espn.com/.../soccer/fifa.world).
# No API key required — you can remove the old API_FOOTBALL_KEY secret if you like:
#   npx wrangler secret delete API_FOOTBALL_KEY
